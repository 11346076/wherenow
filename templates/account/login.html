{% load socialaccount %}
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登入 WhereNow</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Noto Sans TC", "Helvetica Neue", Arial, sans-serif;
            background: #f7f4ef;
            color: #1f2a30;
            min-height: 100vh;
        }

        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
        }

        .login-card {
            width: 100%;
            max-width: 760px;
            background: rgba(255, 255, 255, 0.72);
            border: 1px solid #e5ddd2;
            border-radius: 32px;
            padding: 56px 48px;
            box-shadow: 0 20px 60px rgba(31, 42, 48, 0.08);
        }

        .page-label {
            font-size: 14px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: #9b7b63;
            margin-bottom: 18px;
        }

        .page-title {
            font-size: clamp(42px, 7vw, 76px);
            line-height: 1.02;
            font-weight: 700;
            margin: 0 0 22px;
            color: #142029;
        }

        .page-desc {
            font-size: 22px;
            line-height: 1.8;
            color: #55646f;
            margin: 0 0 36px;
            max-width: 620px;
        }

        .btn-google {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            min-width: 220px;
            padding: 16px 28px;
            border-radius: 999px;
            background: #1f2a30;
            color: #fff;
            text-decoration: none;
            font-size: 16px;
            font-weight: 600;
            transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
            box-shadow: 0 10px 24px rgba(31, 42, 48, 0.14);
        }

        .btn-google:hover {
            background: #142029;
            transform: translateY(-1px);
        }

        .hint {
            margin-top: 18px;
            font-size: 14px;
            color: #7c8a93;
        }

        @media (max-width: 640px) {
            .login-card {
                padding: 36px 24px;
                border-radius: 24px;
            }

            .page-desc {
                font-size: 18px;
            }

            .btn-google {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <section class="login-page">
        <div class="login-card">
            <div class="page-label">WHERENOW</div>
            <h1 class="page-title">Keep places.<br>Keep memories.</h1>
            <p class="page-desc">
                用 Google 登入 WhereNow，開始整理你的地點清單、收藏與回憶紀錄，
                也能和重要的人一起保存生活中的每段足跡。
            </p>

            <a href="{% provider_login_url 'google' %}" class="btn-google">
                使用 Google 登入
            </a>

            <div class="hint">
                登入後會自動進入首頁。
            </div>
        </div>
    </section>
</body>
</html>
