{% extends 'base.html' %}

{% block content %}
<section class="page-section">

  <div class="form-wrap">
    <div class="page-label">Memory Form</div>

    <h1 class="page-title">新增回憶</h1>

    <p class="page-desc">
      記錄一次造訪的日期、感受、評分與照片，把重要的瞬間整理成可以反覆回看的回憶。
    </p>

    <div class="form-card">
      <form method="post" enctype="multipart/form-data">
        {% csrf_token %}

        <div class="form-grid">

          <div class="form-group">
            <label>地點</label>
            <select name="place" required>
              {% for place in places %}
                <option value="{{ place.id }}">{{ place.name }}</option>
              {% endfor %}
            </select>
          </div>

          <div class="double-grid">
            <div class="form-group">
              <label>造訪日期</label>
              <input type="date" name="visit_date" required>
            </div>

            <div class="form-group">
              <label>評分</label>
              <input type="number" name="rating" min="0" max="5" value="0">
            </div>
          </div>

          <div class="double-grid">
            <div class="form-group">
              <label>花費</label>
              <input type="number" name="cost" value="0">
            </div>

            <div class="file-group">
              <label>上傳照片</label>
              <input type="file" name="images" multiple>
              <div class="file-help">
                可一次選擇多張照片，替這次回憶留下更多片段。
              </div>
            </div>
          </div>

          <div class="form-group">
            <label>心得</label>
            <textarea name="comment"></textarea>
          </div>

          <div class="checkbox-group">
            <label>回憶設定</label>

            <div class="checkbox-wrap">
              <label class="checkbox-item">
                <input type="checkbox" name="recommended">
                是否推薦
              </label>

              <label class="checkbox-item">
                <input type="checkbox" name="shared_with_couple">
                是否與情侶共享
              </label>

              <label class="checkbox-item">
                <input type="checkbox" name="is_public" checked>
                是否公開
              </label>
            </div>
          </div>

        </div>

        <div class="action-row">
          <button type="submit" class="btn-main">儲存回憶</button>
          <a href="{% url 'memory_list' %}" class="btn-sub">回回憶列表</a>
        </div>

      </form>
    </div>
  </div>

</section>
{% endblock %}
