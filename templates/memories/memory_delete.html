{% extends 'base.html' %}

{% block content %}
<section class="page-section">
  <div class="wrap-sm">
    <div class="page-label text-center">Delete Memory</div>
    <h1 class="page-title text-center">確定要刪除這筆回憶嗎？</h1>
    <p class="page-desc text-center">
      刪除後將無法復原，請再次確認。
    </p>

    <div class="card card-empty">
      <div class="delete-icon">🗑️</div>

      <div class="delete-name-box">
        <div class="delete-name-label">回憶地點</div>
        <div class="delete-name">{{ memory.place.name }}</div>
      </div>

      <div class="warning-text">
        這筆回憶將會永久刪除，無法恢復。
      </div>

      <!-- 🔥 這裡才是關鍵 -->
      <form method="post">
        {% csrf_token %}
        <div class="action-row action-center">
          <button type="submit" class="btn-danger">確認刪除</button>
          <a href="{% url 'memory_detail' memory.id %}" class="btn-sub">取消</a>
        </div>
      </form>

    </div>
  </div>
</section>
{% endblock %}
