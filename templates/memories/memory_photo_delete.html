{% extends 'base.html' %}

{% block content %}
<section class="page-section">
  <div class="wrap-sm">
    <div class="page-label text-center">Delete Photo</div>
    <h1 class="page-title text-center">確定要刪除這張照片嗎？</h1>
    <p class="page-desc text-center">
      刪除後將無法復原，請再次確認。
    </p>

    <div class="card card-empty">
      <div class="delete-icon">🗑️</div>

      <div class="photo-box">
        <img src="{{ photo.image.url }}" alt="photo">
      </div>

      <div class="warning-text">
        這張照片將會永久刪除，無法恢復。
      </div>

      <form method="post">
        {% csrf_token %}
        <div class="action-row action-center">
          <button type="submit" class="btn-danger">確認刪除</button>
          <a href="{% url 'memory_edit' photo.memory.id %}" class="btn-sub">取消</a>
        </div>
      </form>
    </div>
  </div>
</section>
{% endblock %}
