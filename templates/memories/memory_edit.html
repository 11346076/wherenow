<h1>編輯回憶</h1>

<form method="post" enctype="multipart/form-data">
  {% csrf_token %}

  <p>
    <label>地點：</label><br />
    <select name="place" required>
      {% for p in places %}
      <option
        value="{{ p.id }}"
        {%
        if
        p.id=""
        ="memory.place.id"
        %}selected{%
        endif
        %}
      >
        {{ p.name }}
      </option>
      {% endfor %}
    </select>
  </p>

  <p>
    <label>日期：</label><br />
    <input
      type="date"
      name="visit_date"
      value="{{ memory.visit_date|date:'Y-m-d' }}"
      required
    />
  </p>

  <p>
    <label>心得：</label><br />
    <textarea name="comment" rows="4">{{ memory.comment }}</textarea>
  </p>

  <p>
    <label>評分（0-5）：</label><br />
    <input
      type="number"
      name="rating"
      min="0"
      max="5"
      value="{{ memory.rating }}"
    />
  </p>

  <p>
    <label>花費：</label><br />
    <input type="number" name="cost" min="0" value="{{ memory.cost }}" />
  </p>

  <p>
    <label>
      <input
        type="checkbox"
        name="recommended"
        {%
        if
        memory.recommended
        %}checked{%
        endif
        %}
      />
      推薦
    </label>
  </p>

  <p>
    <label>新增照片：</label><br />
    <input type="file" name="images" multiple />
  </p>

  <button type="submit">儲存修改</button>
</form>

<h2>目前照片</h2>

{% if photos %} {% for photo in photos %}
<div style="margin-bottom: 20px">
  <img src="{{ photo.image.url }}" alt="photo" width="220" /><br />
  <a href="{% url 'memory_photo_delete' photo.id %}">刪除這張照片</a>
</div>
{% endfor %} {% else %}
<p>目前沒有照片</p>
{% endif %}

<p>
  <a href="{% url 'memory_detail' memory.id %}">取消</a>
</p>
