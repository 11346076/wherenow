{% extends 'base.html' %}

{% block content %}
<section class="page-section">
  <div class="wrap-sm">
    <div class="page-label text-center">Couple</div>
    <h1 class="page-title text-center">送出情侶邀請</h1>
    <p class="page-desc text-center">
      輸入對方的帳號名稱，邀請他與你建立共享回憶的關係。
    </p>

    <div class="card" style="margin-bottom: 24px;">

      {% if message %}
        <div class="message-box">
          {{ message }}
        </div>
      {% endif %}

      <form method="post">
        {% csrf_token %}
        {{ form.as_p }}

        <div class="action-row action-center">
          <button type="submit" class="btn-main">送出邀請</button>
        </div>
      </form>

    </div>

    <div class="action-row action-center">
      <a href="{% url 'received_invitations' %}" class="btn-sub">查看邀請</a>
      <a href="{% url 'couple_status' %}" class="btn-sub">情侶狀態</a>
      <a href="{% url 'home' %}" class="btn-sub">回首頁</a>
    </div>
  </div>
</section>
{% endblock %}
