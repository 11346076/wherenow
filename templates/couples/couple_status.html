{% extends 'base.html' %}

{% block content %}
<section class="page-section">
  <div class="wrap-sm">
    <div class="page-label text-center">Couple</div>
    <h1 class="page-title text-center">情侶狀態</h1>

    <div class="card card-empty" style="margin-bottom: 24px;">
      {% if relationship %}
        <div class="status-icon">💞</div>
        <div class="status-text">
          你目前的情侶是：
          <span class="partner-name">{{ partner.username }}</span>
        </div>

        <div class="action-row action-center">
          <a href="{% url 'couple_home' %}" class="btn-main">前往情侶首頁</a>
          <a href="{% url 'break_up' %}" class="btn-danger">解除關係</a>
        </div>
      {% else %}
        <div class="status-icon">🫧</div>
        <div class="status-text">
          你目前還沒有情侶關係
        </div>

        <div class="action-row action-center">
          <a href="{% url 'send_invitation' %}" class="btn-main">送出邀請</a>
          <a href="{% url 'received_invitations' %}" class="btn-sub">查看邀請</a>
        </div>
      {% endif %}
    </div>

    <div class="action-row action-center">
      <a href="{% url 'home' %}" class="btn-sub">回首頁</a>
    </div>
  </div>
</section>
{% endblock %}
