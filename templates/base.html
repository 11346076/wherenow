{% load static %}
<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WhereNow</title>

    <link rel="stylesheet" href="{% static 'css/style.css' %}" />

    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Noto Sans TC", "Helvetica Neue", Arial, sans-serif;
        background: #f7f4ef;
        color: #1f2a30;
      }

      a {
        text-decoration: none;
      }

      .navbar {
        width: 100%;
        background: rgba(255, 255, 255, 0.92);
        border-bottom: 1px solid #e9e2d8;
        padding: 18px 48px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        position: sticky;
        top: 0;
        z-index: 1000;
        backdrop-filter: blur(8px);
      }

      .logo a {
        color: #182126;
        font-size: 32px;
        font-weight: 700;
      }

      .nav-links {
        display: flex;
        gap: 20px;
        flex-wrap: wrap;
        align-items: center;
      }

      .nav-links a {
        color: #4e5c62;
        font-size: 15px;
        transition: 0.2s;
      }

      .nav-links a:hover {
        color: #a97457;
      }

      .user-badge {
        padding: 6px 12px;
        border-radius: 999px;
        background: #efe7dd;
        font-size: 13px;
        color: #1f2a30;
        font-weight: 600;
      }

      .auth-btn {
        border: 1px solid #1f2a30;
        padding: 6px 14px;
        border-radius: 999px;
        font-size: 14px;
        color: #1f2a30;
        background: none;
        cursor: pointer;
        font-family: inherit;
      }

      .auth-btn:hover {
        background: #1f2a30;
        color: white;
      }

      .container {
        max-width: 1180px;
        margin: 0 auto;
        padding: 0 28px;
      }

      .footer {
        text-align: center;
        padding: 34px 20px 40px;
        color: #7b7b7b;
        font-size: 14px;
      }
    </style>
  </head>

  <body>
    <div class="navbar">
      <div class="logo">
        <a href="{% url 'home' %}">WhereNow</a>
      </div>

      <div class="nav-links">
        {% if user.is_authenticated %}
          <a href="{% url 'home' %}">首頁</a>
          <a href="{% url 'place_list' %}">地點</a>
          <a href="{% url 'favorite_list' %}">收藏</a>
          <a href="{% url 'random_pick' %}">抽選</a>
          <a href="{% url 'random_pick_history' %}">抽選紀錄</a>
          <a href="/memories/">回憶</a>
          <a href="/couples/status/">情侶</a>
          <a href="{% url 'profile' %}">個人資料</a>

          <span class="user-badge">{{ user.username }}</span>

          <form action="{% url 'account_logout' %}" method="post" style="margin: 0;">
            {% csrf_token %}
            <button type="submit" class="auth-btn">登出</button>
          </form>
        {% else %}
          <a href="{% url 'account_login' %}" class="auth-btn">登入</a>
        {% endif %}
      </div>
    </div>

    <div class="container">
      {% block content %}
      {% endblock %}
    </div>

    <div class="footer">WhereNow © 2026</div>
  </body>
</html>
