{% extends 'base.html' %}

{% block content %}
<style>
  .delete-wrap {
    max-width: 760px;
    margin: 0 auto;
  }
</style>

<section class="page-section">
  <div class="delete-wrap">
    <div class="page-label text-center">Delete Place</div>
    <h1 class="page-title text-center">確定要刪除這個地點嗎？</h1>
    <p class="page-desc text-center">
      刪除後將無法復原，請再次確認你要移除的內容。
    </p>

    <div class="delete-card">
      <div class="delete-icon">🗑️</div>

      <div class="delete-name-box">
        <div class="delete-name-label">Place Name</div>
        <div class="delete-name">{{ place.name }}</div>
      </div>

      <div class="warning-text">
        這個操作會永久刪除此地點資料，請小心確認。
      </div>

      <form method="post">
        {% csrf_token %}
        <div class="action-row">
          <button type="submit" class="btn-danger">確定刪除</button>
          <a href="{% url 'place_detail' place.pk %}" class="btn-sub">取消</a>
        </div>
      </form>
    </div>
  </div>
</section>
{% endblock %}
